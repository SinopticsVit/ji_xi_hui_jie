    <text class="logo-text-en logo-blue" x="56" y="122" text-anchor="middle">PENGBOTONGHANG</text>
  </g>

  <text class="logo-text-cn" x="124" y="74">
    <tspan class="logo-blue">鸡西</tspan><tspan class="logo-black">鹏博通航</tspan>
