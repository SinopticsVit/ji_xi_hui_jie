<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 128" width="560" height="128" role="img" aria-label="鸡西鹏博通航 PENGBOTONGHANG">
  <defs>
    <style>
      .logo-red { fill: #E31E24; }
      .logo-blue { fill: #0B3D91; }
      .logo-black { fill: #1A1A1A; }
      .logo-white { fill: #FFFFFF; }
      .logo-text-cn {
