    <path class="logo-white" d="
      M 78 56
      C 64 58 48 66 34 78
      C 26 86 20 96 16 106
      L 24 108
      C 28 98 34 90 44 82
      C 56 70 68 64 82 62
      Z"/>
    <path class="logo-white" d="
      M 74 64
      C 60 66 46 74 36 84
      C 30 90 24 100 20 108
      L 28 110
      C 32 100 38 92 48 86
      C 58 76 68 70 78 70
      Z"/>
    <path class="logo-white" d="
      M 70 72
      C 58 74 46 80 38 88
      C 32 94 28 102 26 110
      L 34 112
      C 36 102 40 94 48 90
      C 58 82 66 78 74 78
      Z"/>

    <circle class="logo-red" cx="46" cy="34" r="4"/>

  <!-- Speed arcs -->
    <path class="logo-white" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"
      d="M 22 84 C 32 96 44 100 56 100 C 68 100 80 96 90 84"/>
    <path class="logo-white" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"
